<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#b8954f"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <rect x="40" y="40" width="320" height="320" rx="4" fill="none" stroke="#5a3a1f" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="60" y="60" width="280" height="280" rx="2" fill="none" stroke="#5a3a1f" stroke-width="1"/>
  <!-- Ship icon -->
  <path d="M140,220 Q200,260 260,220" fill="none" stroke="#3a2010" stroke-width="3"/>
  <line x1="200" y1="120" x2="200" y2="220" stroke="#3a2010" stroke-width="2.5"/>
  <path d="M200,120 L260,190 L200,190 Z" fill="#3a2010" opacity="0.6"/>
  <path d="M200,130 L150,190 L200,190 Z" fill="#3a2010" opacity="0.4"/>
  <!-- Waves -->
  <path d="M100,250 Q150,240 200,250 Q250,260 300,250" fill="none" stroke="#3a2010" stroke-width="1" opacity="0.4"/>
  <path d="M100,270 Q150,260 200,270 Q250,280 300,270" fill="none" stroke="#3a2010" stroke-width="1" opacity="0.3"/>
  <!-- VOC monogram -->
  <text x="200" y="310" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#3a2010" letter-spacing="6" opacity="0.7">VOC</text>
  <!-- Seal -->
  <circle cx="200" cy="345" r="14" fill="none" stroke="#5a3a1f" stroke-width="1.5"/>
  <text x="200" y="349" text-anchor="middle" font-family="serif" font-size="11" fill="#5a3a1f">&#9733;</text>
  <text x="200" y="38" text-anchor="middle" font-family="serif" font-size="11" fill="#5a3a1f" letter-spacing="4">VOYAGE</text>
</svg>
